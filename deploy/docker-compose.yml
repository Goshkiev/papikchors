# Лендинг papikchors.ru — Docker на localhost:8082, снаружи host nginx (poker-booking/deploy/nginx/host-vps.conf).
#
#   docker compose -f deploy/docker-compose.yml --env-file deploy/env/prod.env --profile prod up -d --build
#
# Переменные сборки (VITE_*): deploy/env/prod.env и deploy/env/staging.env

name: papikchors

services:
  web-staging:
    profiles: [staging]
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        VITE_CLUB_SLUG: ${VITE_CLUB_SLUG:-papikchors}
        VITE_BOOKING_API_URL: ${VITE_BOOKING_API_URL}
        VITE_BOOKING_APP_URL: ${VITE_BOOKING_APP_URL}
    ports:
      - "${STAGING_HTTP_PORT:-8083}:3000"
    environment:
      HOST: 0.0.0.0
      PORT: 3000
    restart: unless-stopped

  web-prod:
    profiles: [prod]
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        VITE_CLUB_SLUG: ${VITE_CLUB_SLUG:-papikchors}
        VITE_BOOKING_API_URL: ${VITE_BOOKING_API_URL}
        VITE_BOOKING_APP_URL: ${VITE_BOOKING_APP_URL}
    ports:
      - "${PROD_HTTP_PORT:-8082}:3000"
    environment:
      HOST: 0.0.0.0
      PORT: 3000
    restart: unless-stopped
